spring:
  application:
    name: avimax-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/avimax
    username: ${DB_USERNAME:avimax}
    password: ${DB_PASSWORD:avimax}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  flyway:
    enabled: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

app:
  mqtt:
    enabled: true
    # Usa MQTT_BROKER_URL si está seteada, sino detecta automáticamente
    # - Docker: tcp://172.17.0.1:1883 (gateway del host)
    # - Local: tcp://localhost:1883
    broker-url: ${MQTT_BROKER_URL:tcp://localhost:1883}
    client-id: avimax-backend-01
    topic: ${MQTT_TOPIC:avicola/galpon1/lecturas}
    username: ""
    password: ""
    qos: 1
    connection-timeout-seconds: 10
    keep-alive-seconds: 60

